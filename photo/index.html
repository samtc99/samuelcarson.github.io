<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samuel Carson — Photography</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="top">
    <a class="name" href="/">Samuel Carson</a>
  </header>

  <main class="frame">
    <div id="grid" class="masonry" aria-label="Photo gallery"></div>
  </main>

  <!-- Lightbox (optional, keep if you want click-to-view) -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lb-btn lb-close" aria-label="Close (Esc)">✕</button>
    <button class="lb-btn lb-prev" aria-label="Previous (←)">‹</button>
    <button class="lb-btn lb-next" aria-label="Next (→)">›</button>

    <figure class="lb-figure">
      <img id="lb-img" alt="" />
      <figcaption id="lb-cap"></figcaption>
    </figure>
  </div>

  <script src="./app.js"></script>
</body>
</html>
